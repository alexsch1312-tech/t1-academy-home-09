server:
  port: 8081
spring:
  application:
    name: t1-academy-home-08
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092

  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  limits:
    default-value: 100000.00
  scheduler:
    cron-schedule: "0 0 0 * * *"
    timezone: "Europe/Moscow"
  kafka:
    topic-name: "limit-status-events"
    group-id: "limit-service-group" # Добавили сюда

